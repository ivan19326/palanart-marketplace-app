<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telegram | Паланарт</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1d2a44 0%, #0b1220 52%, #070b14 100%);
        color: #fff;
        font-family: Arial, sans-serif;
      }
      .panel {
        width: min(460px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 28px;
        background: rgba(14, 21, 35, 0.92);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      h1 { margin: 0 0 12px; font-size: 32px; }
      p { margin: 0 0 18px; color: rgba(255,255,255,0.78); line-height: 1.5; }
      #telegram-login-host {
        min-height: 54px;
        display: flex;
        justify-content: center;
      }
      .telegram-login-button {
        min-width: 260px;
        min-height: 52px;
        border: none;
        border-radius: 18px;
        background: linear-gradient(135deg, #2aa7ff 0%, #1d7bd7 100%);
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 18px 40px rgba(20, 102, 190, 0.28);
      }
      .telegram-login-button[disabled] {
        cursor: wait;
        opacity: 0.72;
      }
      .hint {
        margin-top: 16px;
        font-size: 14px;
        color: rgba(255,255,255,0.62);
      }
      .error {
        margin-top: 16px;
        color: #ff8e8e;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Вход через Telegram</h1>
      <p>Подтвердите вход через Telegram. После подтверждения мы автоматически вернём вас обратно в Паланарт.</p>
      <div id="telegram-login-host">
        <button id="telegram-login-button" class="telegram-login-button" type="button">Войти через Telegram</button>
      </div>
      <div id="telegram-error" class="error" hidden></div>
      <div class="hint">Если окно входа не открылось само, нажмите кнопку Telegram ниже.</div>
    </main>
    <form id="telegram-complete" action="https://jioakguorsfvjuzyclrg.supabase.co/functions/v1/auth-telegram-callback" method="post" hidden>
      <input type="hidden" name="state" id="telegram-state">
      <input type="hidden" name="id_token" id="telegram-id-token">
    </form>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var state = params.get("state") || "";
        var clientId = params.get("client_id") || "";
        var error = document.getElementById("telegram-error");
        var button = document.getElementById("telegram-login-button");
        var autoOpened = false;

        if (!state || !clientId) {
          error.hidden = false;
          error.textContent = "Не хватает параметров входа Telegram. Вернитесь назад и попробуйте снова.";
          return;
        }

        document.getElementById("telegram-state").value = state;

        window.telegramLoginComplete = function (payload) {
          if (!payload || !payload.id_token) {
            error.hidden = false;
            error.textContent = "Telegram не вернул id_token. Повторите вход ещё раз.";
            return;
          }
          document.getElementById("telegram-id-token").value = payload.id_token;
          document.getElementById("telegram-complete").submit();
        };

        window.telegramLoginError = function (payload) {
          error.hidden = false;
          error.textContent = payload && payload.error
            ? String(payload.error)
            : "Не удалось завершить вход через Telegram.";
        };

        function startTelegramLogin() {
          if (!window.Telegram || !window.Telegram.Login || typeof window.Telegram.Login.auth !== "function") {
            error.hidden = false;
            error.textContent = "Библиотека Telegram Login не загрузилась. Обновите страницу и попробуйте снова.";
            return;
          }

          error.hidden = true;
          button.disabled = true;
          window.Telegram.Login.auth({
            client_id: Number(clientId),
            request_access: ["write"],
            lang: "ru"
          }, function (payload) {
            button.disabled = false;
            if (payload && payload.id_token) {
              window.telegramLoginComplete(payload);
              return;
            }
            window.telegramLoginError(payload || { error: "Telegram не вернул данные входа." });
          });
        }

        button.addEventListener("click", startTelegramLogin);

        var script = document.createElement("script");
        script.async = true;
        script.src = "https://oauth.telegram.org/js/telegram-login.js?3";
        script.onload = function () {
          if (autoOpened) return;
          autoOpened = true;
          startTelegramLogin();
        };
        script.onerror = function () {
          error.hidden = false;
          error.textContent = "Не удалось загрузить Telegram Login. Проверьте сеть и попробуйте снова.";
        };
        document.head.appendChild(script);
      })();
    </script>
  </body>
</html>
